<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Page Not Found</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: #ffffff;
      color: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    .container {
      text-align: center;
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 80px;
      margin: 0;
      font-weight: 600;
    }

    h2 {
      margin: 10px 0 20px;
      font-weight: 400;
      color: #555;
    }

    p {
      font-size: 16px;
      color: #777;
      margin-bottom: 30px;
    }

    a {
      display: inline-block;
      text-decoration: none;
      color: #111;
      border: 1px solid #ddd;
      padding: 10px 20px;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    a:hover {
      background: #111;
      color: #fff;
      border-color: #111;
    }

    .line {
      width: 60px;
      height: 2px;
      background: #ddd;
      margin: 20px auto;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>404</h1>
    <div class="line"></div>
    <h2>Page not found</h2>
    <p>The page you’re looking for doesn’t exist or has been moved.</p>
    <a href="https://kdb.uz/uz">Go back home</a>
  </div>
</body>
</html>
